---
layout: default
title: "Home"
---
<div class="project-list">
  {% for project in site.projects %}
    <div class="card">
      <a href="{{ project.url | relative_url }}">
        <img src="{{ '/thumbs/' | append: project.folder_name | append: '/' | append: project.gallery_images[0] | relative_url }}">
        <h3>{{ project.title }}</h3>
      </a>
    </div>
  {% endfor %}
</div>
