<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | My Portfolio</title>
    
    <style>
        body { 
            font-family: sans-serif; 
            line-height: 1.6; 
            padding: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        
        /* The Responsive Grid */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        
        .thumb-card img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>
    <nav><a href="{{ '/' | relative_url }}">Home</a></nav>
    <main>{{ content }}</main>
</body>
</html>
